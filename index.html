<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gelectronics Cloud Ombor</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAPuxVuP_KSVgTbgBuLX6jATt_2dWIYmfU",
      authDomain: "scholaris-ai.firebaseapp.com",
      projectId: "scholaris-ai",
      storageBucket: "scholaris-ai.firebasestorage.app",
      messagingSenderId: "403057074223",
      appId: "1:403057074223:web:078f51c8cf29243ac3a6da",
      databaseURL: "https://scholaris-ai-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.saveItem = function() {
        let model = document.getElementById('tModel').value;
        let soni = document.getElementById('tSoni').value;
        let narx = document.getElementById('tNarx').value;
        let supplier = document.getElementById('tSupplier').value;
        let sana = document.getElementById('tSana').value;
        let holati = document.getElementById('tHolati').value;

        if(!model || !soni || !narx) {
            window.Telegram.WebApp.showAlert("Iltimos, asosiy maydonlarni to'ldiring!");
            return;
        }

        push(ref(db, 'ombor/' + window.currentCat), {
            model: model, soni: soni, narx: narx,
            supplier: supplier, sana: sana, holati: holati,
            timestamp: Date.now()
        }).then(() => {
            closeModal();
            window.Telegram.WebApp.HapticFeedback.notificationOccurred('success');
        });
    };

    window.deleteItem = function(id) {
        window.Telegram.WebApp.showConfirm("Sotildimi yoki o'chirasizmi?", (res) => {
            if(res) remove(ref(db, `ombor/${window.currentCat}/${id}`));
        });
    };

    window.loadData = function(cat) {
        onValue(ref(db, 'ombor/' + cat), (snapshot) => {
            renderItems(snapshot.val());
        });
    };

    window.updateDashboard = function() {
        onValue(ref(db, 'ombor'), (snapshot) => {
            let count = 0; let value = 0;
            const data = snapshot.val();
            if(data) {
                for(let c in data) {
                    for(let id in data[c]) {
                        count += parseInt(data[c][id].soni || 0);
                        value += (parseInt(data[c][id].soni || 0) * parseFloat(data[c][id].narx || 0));
                    }
                }
            }
            document.getElementById('totalItems').innerText = count + " ta";
            document.getElementById('totalValue').innerText = "$" + value.toLocaleString();
        });
    };
  </script>

  <style>
     :root { --primary: #0f2027; --accent: #2c5364; --success: #11998e; }
     body { font-family: sans-serif; background: #f4f7f6; margin:0; padding:0; }
     .header { background: linear-gradient(to right, var(--primary), var(--accent)); color: white; padding: 20px; border-bottom-radius: 20px; }
     .stats { display: flex; gap: 10px; margin-top: 15px; }
     .stat-box { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px; flex: 1; }
     .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
     .card { background: white; padding: 25px; border-radius: 15px; text-align: center; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
     .inventory-section { display: none; padding: 15px; }
     .item-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--success); }
     .modal { display: none; position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.5); height: 100%; align-items: flex-end; }
     .modal-content { background: white; width: 100%; padding: 20px; border-radius: 20px 20px 0 0; box-sizing: border-box; }
     input, select { width: 100%; padding: 12px; margin: 5px 0 10px; border: 1px solid #ddd; border-radius: 8px; }
     .add-btn { background: var(--success); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-bottom: 15px; }
  </style>
</head>
<body>
   <div class="header" id="headerSection">
      <div style="font-size: 22px; font-weight: bold;">Gelectronics Cloud</div>
      <div class="stats">
         <div class="stat-box">Dona: <br><span id="totalItems">0</span></div>
         <div class="stat-box">Qiymat: <br><span id="totalValue">$0</span></div>
      </div>
   </div>

   <div class="grid" id="mainGrid">
      <div class="card" onclick="openCategory('HMI')">🖥 HMI</div>
      <div class="card" onclick="openCategory('PLC')">⚙️ PLC</div>
      <div class="card" onclick="openCategory('INVERTER')">⚡️ INVERTER</div>
      <div class="card" onclick="openCategory('SERVO')">🤖 SERVO</div>
   </div>

   <div class="inventory-section" id="invSection">
      <button onclick="goBack()" style="border:none; background:none; font-weight:bold; padding:10px 0;">⬅️ Orqaga</button>
      <h2 id="catTitle"></h2>
      <button class="add-btn" onclick="openModal()">+ Mahsulot qo'shish</button>
      <div id="itemsContainer"></div>
   </div>

   <div class="modal" id="addModal">
      <div class="modal-content">
         <input type="text" id="tModel" placeholder="Model">
         <input type="number" id="tSoni" placeholder="Soni">
         <input type="number" id="tNarx" placeholder="Narxi ($)">
         <input type="text" id="tSupplier" placeholder="Yetkazib beruvchi">
         <input type="date" id="tSana">
         <select id="tHolati"><option value="Yangi">Yangi</option><option value="B/U">B/U</option></select>
         <button onclick="saveItem()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:10px; font-weight:bold;">SAQLASH</button>
         <button onclick="closeModal()" style="width:100%; margin-top:10px; border:none; background:none;">Bekor qilish</button>
      </div>
   </div>

   <script>
      let tg = window.Telegram.WebApp;
      window.currentCat = '';
      function openCategory(cat) {
          window.currentCat = cat;
          document.getElementById('headerSection').style.display = 'none';
          document.getElementById('mainGrid').style.display = 'none';
          document.getElementById('invSection').style.display = 'block';
          document.getElementById('catTitle').innerText = cat;
          window.loadData(cat);
      }
      function goBack() {
          document.getElementById('headerSection').style.display = 'block';
          document.getElementById('mainGrid').style.display = 'grid';
          document.getElementById('invSection').style.display = 'none';
      }
      function openModal() { document.getElementById('addModal').style.display = 'flex'; document.getElementById('tSana').valueAsDate = new Date(); }
      function closeModal() { document.getElementById('addModal').style.display = 'none'; }
      function renderItems(data) {
          let container = document.getElementById('itemsContainer');
          container.innerHTML = '';
          for(let id in data) {
              let item = data[id];
              let div = document.createElement('div');
              div.className = 'item-card';
              div.innerHTML = `<b>${item.model}</b> (${item.holati})<br>Soni: ${item.soni} ta | Narxi: $${item.narx}<br><small>Sana: ${item.sana}</small><br><button onclick="deleteItem('${id}')" style="color:red; border:none; background:none; padding:5px 0;">🗑 O'chirish</button>`;
              container.appendChild(div);
          }
      }
      window.onload = () => window.updateDashboard();
   </script>
</body>
</html>
