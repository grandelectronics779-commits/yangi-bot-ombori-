<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gelectronics Pro Ombor</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
     :root { --main-bg: #f4f7f6; --primary: #0f2027; --secondary: #203a43; --accent: #2c5364; --success: #11998e; --danger: #eb5757; --card-bg: #ffffff; --text-main: #333333; --text-muted: #7f8c8d; }
     body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--main-bg); margin:0; padding:0; color: var(--text-main); }
     
     /* Header Dashboard */
     .header { background: linear-gradient(to right, var(--primary), var(--secondary), var(--accent)); color: white; padding: 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
     .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
     .company-name { font-size: 22px; font-weight: 800; letter-spacing: 1px; }
     .stats-container { display: flex; gap: 15px; }
     .stat-box { background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 10px; flex: 1; backdrop-filter: blur(5px); }
     .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }
     .stat-value { font-size: 18px; font-weight: bold; margin-top: 5px; }

     /* Kategoriya Grid */
     .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
     .card { background: var(--card-bg); padding: 20px 15px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; cursor: pointer; transition: transform 0.2s; border: 1px solid #e1e8ed; display: flex; flex-direction: column; align-items: center; justify-content: center; }
     .card:active { transform: scale(0.96); }
     .card-icon { font-size: 32px; margin-bottom: 10px; }
     .card-title { font-size: 14px; font-weight: 700; color: var(--secondary); }

     /* Tovar Ro'yxati */
     .inventory-section { display: none; padding: 15px; }
     .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
     .back-btn { background: #e0e6ed; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; color: var(--secondary); display: flex; align-items: center; gap: 5px; }
     .add-btn { background: var(--success); color: white; padding: 12px; border: none; border-radius: 10px; cursor: pointer; width: 100%; font-size: 15px; font-weight: bold; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(17, 153, 142, 0.3); }
     
     .item-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border-left: 4px solid var(--accent); }
     .item-header { display: flex; justify-content: space-between; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; margin-bottom: 8px; }
     .item-model { font-weight: 800; font-size: 16px; color: var(--primary); }
     .item-status { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold; }
     .status-yangi { background: #e8f8f5; color: #11998e; }
     .status-bu { background: #fef5e7; color: #f39c12; }
     
     .item-details { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 13px; color: var(--text-muted); }
     .detail-row span { font-weight: 600; color: var(--text-main); }
     .item-actions { margin-top: 12px; display: flex; gap: 10px; justify-content: flex-end; }
     .action-btn { padding: 6px 12px; border-radius: 6px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; }
     .btn-edit { background: #f1f4f8; color: var(--accent); }
     .btn-delete { background: #fdedec; color: var(--danger); }

     /* Kiritish Formasi (Modal) */
     .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); justify-content: center; align-items: flex-end; z-index: 100; padding-bottom: 20px;}
     .modal-content { background: white; width: 90%; max-height: 85vh; overflow-y: auto; padding: 20px; border-radius: 20px; box-shadow: 0 -10px 25px rgba(0,0,0,0.1); animation: slideUp 0.3s ease-out; }
     @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
     
     .modal-header { font-size: 18px; font-weight: 800; color: var(--primary); margin-bottom: 15px; text-align: center; }
     .input-group { margin-bottom: 12px; }
     .input-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 4px; }
     input, select { width: 100%; padding: 12px; border: 1.5px solid #e1e8ed; border-radius: 10px; box-sizing: border-box; font-size: 14px; background: #f8fafc; outline: none; transition: border 0.2s; }
     input:focus, select:focus { border-color: var(--accent); }
     
     .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
     .save-btn { background: var(--accent); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 15px; margin-top: 10px; margin-bottom: 10px; }
     .close-btn { background: transparent; color: var(--text-muted); border: 1px solid #e1e8ed; padding: 12px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 15px; }
  </style>
</head>
<body>

   <div class="header" id="headerSection">
      <div class="header-top">
         <div class="company-name">Gelectronics</div>
         <div style="font-size: 13px; opacity: 0.9;" id="userName">Admin</div>
      </div>
      <div class="stats-container">
         <div class="stat-box">
            <div class="stat-label">Jami tovarlar</div>
            <div class="stat-value" id="totalItems">0 ta</div>
         </div>
         <div class="stat-box">
            <div class="stat-label">Umumiy qiymat</div>
            <div class="stat-value" id="totalValue">$0</div>
         </div>
      </div>
   </div>

   <div class="grid" id="mainGrid">
      <div class="card" onclick="openCategory('HMI')"><div class="card-icon">🖥</div><div class="card-title">INOVANCE HMI</div></div>
      <div class="card" onclick="openCategory('PLC')"><div class="card-icon">⚙️</div><div class="card-title">INOVANCE PLC</div></div>
      <div class="card" onclick="openCategory('INVERTER')"><div class="card-icon">⚡️</div><div class="card-title">INOVANCE INVERTER</div></div>
      <div class="card" onclick="openCategory('SERVO')"><div class="card-icon">🤖</div><div class="card-title">INOVANCE SERVO</div></div>
   </div>

   <div class="inventory-section" id="invSection">
      <div class="top-bar">
         <button class="back-btn" onclick="goBack()">🔙 Orqaga</button>
         <h3 id="catTitle" style="color:var(--primary); margin:0; font-weight: 800;">Kategoriya</h3>
      </div>
      
      <button class="add-btn" onclick="openModal()">+ Yangi Mahsulot Kiritish</button>
      
      <div id="itemsContainer">
         </div>
   </div>

   <div class="modal" id="addModal">
      <div class="modal-content">
         <div class="modal-header">Mahsulot Ma'lumotlari</div>
         
         <div class="input-group">
            <label>Model / Seriya raqami</label>
            <input type="text" id="tModel" placeholder="Masalan: MD500-4T11G">
         </div>
         
         <div class="form-row">
            <div class="input-group">
               <label>Kompaniya (Brend)</label>
               <input type="text" id="tBrand" value="Inovance" placeholder="Kompaniya nomi">
            </div>
            <div class="input-group">
               <label>Holati</label>
               <select id="tHolati">
                  <option value="Yangi">Yangi</option>
                  <option value="B/U">Ishlatilgan (B/U)</option>
               </select>
            </div>
         </div>

         <div class="form-row">
            <div class="input-group">
               <label>Soni (dona)</label>
               <input type="number" id="tSoni" placeholder="0">
            </div>
            <div class="input-group">
               <label>Narxi (1 donasi uchun, $)</label>
               <input type="number" id="tNarx" placeholder="0">
            </div>
         </div>

         <div class="input-group">
            <label>Yetkazib beruvchi / Kimdan keldi?</label>
            <input type="text" id="tSupplier" placeholder="Firma yoki shaxs nomi">
         </div>

         <div class="input-group">
            <label>Kelgan sana</label>
            <input type="date" id="tSana">
         </div>

         <button class="save-btn" onclick="saveItem()">Saqlash va Tasdiqlash</button>
         <button class="close-btn" onclick="closeModal()">Bekor qilish</button>
      </div>
   </div>

   <script>
      let tg = window.Telegram.WebApp;
      tg.expand();
      
      if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
          document.getElementById('userName').innerText = tg.initDataUnsafe.user.first_name;
      }

      // Hozirgi kunda saqlash usuli (Faqat bitta telefon uchun ishlaydi)
      let db = JSON.parse(localStorage.getItem('gelectronics_pro_db')) || {
          'HMI': [], 'PLC': [], 'INVERTER': [], 'SERVO': []
      };

      let currentCat = '';
      updateDashboard();

      function updateDashboard() {
         let count = 0; let value = 0;
         for(let cat in db) {
            db[cat].forEach(item => {
               count += parseInt(item.soni || 0);
               value += (parseInt(item.soni || 0) * parseFloat(item.narx || 0));
            });
         }
         document.getElementById('totalItems').innerText = count + " ta";
         document.getElementById('totalValue').innerText = "$" + value.toLocaleString();
      }

      function openCategory(cat) {
          currentCat = cat;
          document.getElementById('headerSection').style.display = 'none';
          document.getElementById('mainGrid').style.display = 'none';
          document.getElementById('invSection').style.display = 'block';
          document.getElementById('catTitle').innerText = 'INOVANCE ' + cat;
          renderItems();
      }

      function goBack() {
          document.getElementById('headerSection').style.display = 'block';
          document.getElementById('mainGrid').style.display = 'grid';
          document.getElementById('invSection').style.display = 'none';
          updateDashboard();
      }

      function openModal() {
          // Bugungi sanani avtomatik qoyish
          document.getElementById('tSana').valueAsDate = new Date();
          document.getElementById('addModal').style.display = 'flex';
      }

      function closeModal() {
          document.getElementById('addModal').style.display = 'none';
      }

      function saveItem() {
          let model = document.getElementById('tModel').value;
          let brand = document.getElementById('tBrand').value;
          let soni = document.getElementById('tSoni').value;
          let narx = document.getElementById('tNarx').value;
          let supplier = document.getElementById('tSupplier').value;
          let sana = document.getElementById('tSana').value;
          let holati = document.getElementById('tHolati').value;

          if(!model || !soni || !narx) {
              tg.showAlert("Model, soni va narxini kiritish majburiy!");
              return;
          }

          db[currentCat].push({ 
             model: model, brand: brand, soni: soni, narx: narx, 
             supplier: supplier, sana: sana, holati: holati, id: Date.now() 
          });
          
          localStorage.setItem('gelectronics_pro_db', JSON.stringify(db));
          
          document.getElementById('tModel').value = '';
          document.getElementById('tSoni').value = '';
          document.getElementById('tNarx').value = '';
          
          closeModal();
          renderItems();
          tg.HapticFeedback.notificationOccurred('success');
      }

      function deleteItem(id) {
          tg.showConfirm("Tovarni ombordan butunlay o'chirasizmi?", function(res) {
              if(res) {
                  db[currentCat] = db[currentCat].filter(item => item.id !== id);
                  localStorage.setItem('gelectronics_pro_db', JSON.stringify(db));
                  renderItems();
              }
          });
      }

      function renderItems() {
          let container = document.getElementById('itemsContainer');
          container.innerHTML = '';
          let items = db[currentCat];
          
          if(items.length === 0) {
              container.innerHTML = '<div style="text-align:center; padding: 40px; color:#95a5a6;">Bu kategoriyada tovar yo\'q</div>';
              return;
          }

          items.forEach((item) => {
              let statusClass = item.holati === 'Yangi' ? 'status-yangi' : 'status-bu';
              let total = (item.soni * item.narx).toLocaleString();
              
              let div = document.createElement('div');
              div.className = 'item-card';
              div.innerHTML = `
                  <div class="item-header">
                     <div class="item-model">${item.model}</div>
                     <div class="item-status ${statusClass}">${item.holati}</div>
                  </div>
                  <div class="item-details">
                     <div class="detail-row">Qoldiq: <span>${item.soni} ta</span></div>
                     <div class="detail-row">Narxi: <span>$${item.narx}</span></div>
                     <div class="detail-row">Jami: <span>$${total}</span></div>
                     <div class="detail-row">Kompaniya: <span>${item.brand}</span></div>
                     <div class="detail-row" style="grid-column: span 2;">Yetkazib beruvchi: <span>${item.supplier || '-'}</span></div>
                     <div class="detail-row" style="grid-column: span 2;">Sana: <span>${item.sana || '-'}</span></div>
                  </div>
                  <div class="item-actions">
                     <button class="action-btn btn-delete" onclick="deleteItem(${item.id})">🗑 O'chirish</button>
                  </div>
              `;
              container.appendChild(div);
          });
      }
   </script>
</body>
</html>
